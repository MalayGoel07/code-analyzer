<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="overscroll-none">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback • Coan-X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #0f172a, #020617); }
    </style>
</head>

<body class="text-white font-mono min-h-screen flex flex-col">
    <nav class="flex items-center justify-between px-8 py-4 border-b border-white/10 bg-white/5 backdrop-blur-lg sticky top-0 z-10">
        <div class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">Coan-X 🚀</div>
        <a th:href="@{/home}" class="no-underline text-sm text-gray-400 hover:text-cyan-400 transition-colors duration-200 flex items-center gap-1"> ← Back</a>
    </nav>
    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-lg">
            <div class="mb-6 text-center">
                <h2 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 via-blue-400 to-purple-400 bg-clip-text text-transparent">Share Your Feedback</h2>
                <p class="text-gray-500 text-xs mt-1 italic">"Without Test u cant fetch the fest!"</p>
            </div>
            <div class="rounded-2xl bg-white/5 border border-white/10 backdrop-blur-lg shadow-2xl shadow-black/40 overflow-hidden">
                <div class="h-px w-full bg-gradient-to-r from-transparent via-cyan-500/50 to-transparent"></div>
                <div class="p-8">
                    <div class="space-y-2 mb-6" th:if="${messages != null}">
                        <div th:each="msg : ${messages}" th:text="${msg.text}" class="px-4 py-3 rounded-lg text-sm bg-green-500/10 border border-green-400/30 text-green-300"></div>
                    </div>
                    <form th:action="@{/feedback}" th:object="${form}" method="post" class="space-y-5">
                        <div class="space-y-1.5">
                            <label class="text-xs text-gray-400 uppercase tracking-widest flex items-center gap-2"> <span class="inline-block w-1.5 h-1.5 rounded-full bg-cyan-400"></span> Email</label>
                            <input type="email" th:field="*{email}" placeholder="you@example.com" class="w-full px-4 py-2.5 rounded-lg bg-black/40 border border-white/10 text-sm text-white placeholder-gray-600 outline-none focus:border-cyan-400/60 focus:bg-black/60 transition-all duration-200"/>
                            <span th:each="err : ${#fields.errors('email')}" th:text="${err}" class="text-red-400 text-xs block"></span>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-xs text-gray-400 uppercase tracking-widest flex items-center gap-2"> <span class="inline-block w-1.5 h-1.5 rounded-full bg-purple-400"></span> Message</label>
                            <textarea th:field="*{message}" rows="5" placeholder="Bugs, ideas, praise — anything helps..." class="w-full px-4 py-2.5 rounded-lg bg-black/40 border border-white/10 text-sm text-white placeholder-gray-600 outline-none focus:border-cyan-400/60 focus:bg-black/60 transition-all duration-200 resize-none"></textarea>
                            <span th:each="err : ${#fields.errors('message')}" th:text="${err}" class="text-red-400 text-xs block"></span>
                        </div>
                        <div class="flex items-center justify-between pt-2">
                            <button type="submit" class="px-6 py-2.5 bg-cyan-600 hover:bg-cyan-500 active:scale-95 rounded-lg text-sm font-semibold shadow-lg shadow-cyan-500/20 hover:shadow-cyan-500/40 transition-all duration-200 cursor-pointer"> Submit →</button>
                            <a th:href="@{/home}" class="no-underline text-xs text-gray-500 hover:text-cyan-400 transition-colors duration-200">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
            <p class="text-center text-gray-600 text-xs mt-5">Your feedback helps improve Coan-X for every developer.</p>
        </div>
    </main>
</body>
</html>

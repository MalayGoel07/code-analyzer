<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="overscroll-none">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Complexity • Coan-X</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #0f172a, #020617);
        }
    </style>
</head>

<body class="text-white font-mono min-h-screen flex flex-col">
    <nav class="flex items-center justify-between px-8 py-4 border-b border-white/10 bg-white/5 backdrop-blur-lg">
        <div class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">Code Analyzer ⚡</div>
        <a th:href="@{/home}" class="text-sm text-gray-300 hover:text-cyan-400 transition"> ← Back</a>
    </nav>
    <main class="flex-1 grid md:grid-cols-2 gap-6 px-6 py-8">
        <section class="p-6 rounded-xl bg-white/5 border border-white/10 backdrop-blur-lg space-y-4">
            <h1 class="text-xl font-bold">Paste Your Code</h1>
            <form th:action="@{/analyze}" method="post" class="space-y-4">
                <textarea name="code" rows="16" placeholder="Paste your code here..." th:text="${code}" class="w-full px-3 py-2 rounded-md bg-black/50 border border-white/10 text-xs outline-none focus:border-cyan-400 transition"></textarea>
                <div class="flex justify-between items-center">
                    <select name="language" class="px-3 py-2 rounded bg-black/50 border border-white/10 text-sm">
                        <option value="java" th:selected="${language == 'java'}">Java</option>
                        <option value="python" th:selected="${language == 'python'}">Python</option>
                    </select>
                    <button type="submit" class="px-4 py-2 bg-cyan-500/80 hover:bg-cyan-600 transition rounded-md text-sm font-semibold">Analyze 🚀</button>
                </div>
            </form>
        </section>
        <section class="p-6 rounded-xl bg-white/5 border border-white/10 backdrop-blur-lg space-y-4">
            <h2 class="text-lg font-bold">Analysis Result 📊</h2>
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div class="p-3 rounded bg-white/5 border border-white/10">
                    <p class="text-gray-400 text-xs">Lines</p>
                    <p th:text="${result != null ? result.lines : 0}"></p>
                </div>

                <div class="p-3 rounded bg-white/5 border border-white/10">
                    <p class="text-gray-400 text-xs">Words</p>
                    <p th:text="${result != null ? result.words : 0}"></p>
                </div>

                <div class="p-3 rounded bg-white/5 border border-white/10">
                    <p class="text-gray-400 text-xs">If Statements</p>
                    <p th:text="${result != null ? result.ifCount : 0}"></p>
                </div>

                <div class="p-3 rounded bg-white/5 border border-white/10">
                    <p class="text-gray-400 text-xs">Loops</p>
                    <p th:text="${result != null ? result.loopCount : 0}"></p>
                </div>

                <div class="p-3 rounded bg-white/5 border border-white/10">
                    <p class="text-gray-400 text-xs">Functions</p>
                    <p th:text="${result != null ? result.functionCount : 0}"></p>
                </div>
                <div class="p-3 rounded bg-white/5 border border-white/10">
                    <p class="text-gray-400 text-xs">Classes</p>
                    <p th:text="${result != null ? result.classCount : 0}"></p>
                </div>
            </div>
            <div class="space-y-3">
                <div class="p-3 rounded bg-cyan-500/10 border border-cyan-400/20">
                    <p class="text-xs text-gray-400">Time Complexity</p>
                    <p class="text-cyan-300 font-semibold" th:text="${result != null ? result.timeComplexity : 'N/A'}"></p>
                </div>
                <div class="p-3 rounded bg-purple-500/10 border border-purple-400/20">
                    <p class="text-xs text-gray-400">Space Complexity</p>
                    <p class="text-purple-300 font-semibold" th:text="${result != null ? result.spaceComplexity : 'N/A'}"></p>
                </div>
                <div class="p-3 rounded bg-yellow-500/10 border border-yellow-400/20">
                    <p class="text-xs text-gray-400">Cyclomatic Complexity</p>
                    <p class="text-yellow-300 font-semibold" th:text="${result != null ? result.cyclomaticComplexity : 'N/A'}"></p>
                </div>
                <div class="p-3 rounded bg-red-500/10 border border-red-400/20">
                    <p class="text-xs text-gray-400">Max Nesting Depth</p>
                    <p class="text-red-300 font-semibold"
                       th:text="${result != null ? result.maxNestingDepth : 0}"></p>
                </div>
            </div>
            <div class="text-right">
                <a th:href="@{/home}" class="text-sm text-gray-400 hover:text-cyan-400 transition">← Back</a>
            </div>
        </section>
    </main>
</body>
</html>

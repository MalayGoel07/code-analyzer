<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="overscroll-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coan-X Demo</title>
    <style>body {background: radial-gradient(circle at top, #0f172a, #020617);}</style>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen text-white font-mono px-6 py-10">
    <div class="mx-auto max-w-5xl">
        <div class="flex items-center justify-between gap-4">
            <div>
                <p class="text-cyan-400 text-sm uppercase tracking-[0.3em]">Live Demo</p>
                <h1 class="mt-2 text-3xl font-bold">Coan-X Product Walkthrough</h1>
                <p class="mt-3 text-sm text-slate-400">This page streams the demo video from Spring Boot static assets.</p>
            </div>
            <a th:href="@{/}" class="rounded-lg border border-cyan-500/40 px-4 py-2 text-cyan-300 transition hover:bg-cyan-500/10">Back Home</a>
        </div>

        <div class="mt-8 overflow-hidden rounded-3xl border border-white/10 bg-white/5 p-4 shadow-2xl shadow-cyan-950/40">
            <video class="w-full rounded-2xl bg-black" controls preload="metadata">
                <source th:src="@{/videos/demo.mp4}" src="/videos/demo.mp4" type="video/mp4">
                Your browser does not support embedded video.
            </video>
        </div>
    </div>
</body>
</html>

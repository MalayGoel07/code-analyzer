<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="overscroll-none">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Password • Coan-X</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #0f172a, #020617);
        }
    </style>
</head>

<body class="text-white font-mono min-h-screen flex flex-col">
    <nav class="flex items-center justify-between px-8 py-4 border-b border-white/10 bg-white/5 backdrop-blur-lg">
        <div class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent"> Coan-X 🚀
        </div>
        <a th:href="@{/profile}" class="text-sm text-gray-300 hover:text-cyan-400 transition"> ← Back</a>
    </nav>
    <div class="flex-1 flex items-center justify-center px-4">
        <div class="w-full max-w-md p-8 rounded-xl bg-white/5 border border-white/10 backdrop-blur-lg space-y-6">
            <div class="space-y-2" th:if="${messages != null}">
                <div th:each="msg : ${messages}" th:text="${msg.text}" class="px-4 py-2 rounded-md text-sm bg-green-500/20 border border-green-400/30"></div>
            </div>
            <div>
                <h2 class="text-xl font-bold">Edit Password</h2>
                <p class="text-gray-400 text-sm">Set a new secure password</p>
            </div>
            <form th:action="@{/edit-password}" th:object="${form}" method="post" class="space-y-5">
                <input type="hidden" th:field="*{userId}" />
                <div>
                    <label class="text-sm text-gray-400">New Password</label>
                    <input type="password" th:field="*{password}" placeholder="Enter new password" class="w-full mt-1 px-3 py-2 rounded-md bg-black/40 border border-white/10 text-sm outline-none focus:border-cyan-400 transition">
                    <span th:each="err : ${#fields.errors('password')}" th:text="${err}" class="text-red-400 text-xs mt-1 block"></span>
                </div>
                <div>
                    <label class="text-sm text-gray-400">Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}" placeholder="Re-enter new password" class="w-full mt-1 px-3 py-2 rounded-md bg-black/40 border border-white/10 text-sm outline-none focus:border-cyan-400 transition">
                    <span th:each="err : ${#fields.errors('confirmPassword')}" th:text="${err}" class="text-red-400 text-xs mt-1 block"></span>
                    <span th:each="err : ${#fields.errors('passwordConfirmed')}" th:text="${err}" class="text-red-400 text-xs mt-1 block"></span>
                </div>
                <div class="text-xs text-gray-500 border border-white/10 rounded-md p-3 bg-black/30">
                    • Use at least 8 characters  
                    • Include uppercase, lowercase, number  
                    • Avoid common words
                </div>
                <div class="flex items-center justify-between">
                    <button type="submit" class="px-5 py-2 bg-cyan-500/80 hover:bg-cyan-600 transition rounded-md text-sm font-semibold">Update Password 🔐</button>
                    <a th:href="@{/profile}" class="text-sm text-gray-400 hover:text-cyan-400 transition">  Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

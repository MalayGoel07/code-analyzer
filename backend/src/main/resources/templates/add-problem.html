<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="overscroll-none">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Problem • Coan-X Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #0f172a, #020617);
        }
    </style>
</head>

<body class="text-white font-mono min-h-screen flex flex-col">
    <nav class="flex items-center justify-between px-8 py-4 border-b border-white/10 bg-white/5 backdrop-blur-lg">
        <div class="text-xl font-bold bg-gradient-to-r from-red-400 to-pink-500 bg-clip-text text-transparent">Admin Panel ⚡</div>
        <div class="flex gap-6 text-sm">
            <a th:href="@{/adminhome}" class="text-gray-300 hover:text-red-400 transition">Dashboard</a>
            <a th:href="@{/admin/logout}" class="text-gray-300 hover:text-pink-400 transition">Logout</a>
        </div>
    </nav>
    <main class="flex-1 px-6 py-10 max-w-4xl mx-auto space-y-8">
        <section class="p-6 rounded-xl bg-white/5 border border-white/10 backdrop-blur-lg">
            <p class="text-xs text-red-400 uppercase tracking-widest">Admin Upload</p>
            <h1 class="text-2xl font-bold mt-1">Add Problem Statement</h1>
            <p class="text-gray-400 text-sm mt-2"> Upload daily coding problems. Older problems are stored automatically.</p>
        </section>
        <div th:if="${message}"
             th:text="${message}"
             class="px-4 py-2 rounded-md text-sm bg-green-500/20 border border-green-400/30">
        </div>
        <section class="p-6 rounded-xl bg-white/5 border border-white/10 backdrop-blur-lg">
            <form th:action="@{/admin/problems}" th:object="${problem}" method="post" class="space-y-5">
                <div>
                    <label class="text-sm text-gray-400">Problem Title</label>
                    <input type="text" th:field="*{title}" placeholder="Example: Two Sum Variation" class="w-full mt-1 px-3 py-2 rounded-md bg-black/40 border border-white/10 text-sm outline-none focus:border-red-400 transition">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Topic</label>
                    <input type="text" th:field="*{topic}" placeholder="Arrays, DSA, ML, Flask" class="w-full mt-1 px-3 py-2 rounded-md bg-black/40 border border-white/10 text-sm outline-none focus:border-red-400 transition">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Difficulty</label>
                    <select th:field="*{difficulty}" class="w-full mt-1 px-3 py-2 rounded-md bg-black/40 border border-white/10 text-sm outline-none focus:border-red-400">
                        <option value="">Select difficulty</option>
                        <option value="Easy">Easy</option>
                        <option value="Medium">Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm text-gray-400">Problem Statement</label>
                    <textarea th:field="*{statement}" rows="10" placeholder="Write the complete problem statement here..." class="w-full mt-1 px-3 py-2 rounded-md bg-black/40 border border-white/10 text-sm outline-none focus:border-red-400 transition"></textarea>
                </div>
                <div class="space-y-1 text-red-400 text-xs" th:if="${#fields.hasErrors('*')}">
                    <p th:each="err : ${#fields.errors('*')}" th:text="${err}"></p>
                </div>
                <button type="submit" class="w-full py-2 bg-red-500/80 hover:bg-red-600 transition rounded-md text-sm font-semibold"> Save Problem ⚡ </button>
            </form>
        </section>
        <div class="flex justify-between text-sm">
            <a th:href="@{/adminhome}" class="text-gray-400 hover:text-red-400 transition">  ← Admin Home</a>
            <a th:href="@{/instant-metrics}" class="text-gray-400 hover:text-pink-400 transition">  View Problems →</a>
        </div>
    </main>
</body>
</html>
